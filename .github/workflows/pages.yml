# main에 푸시된 빌드를 gh-pages 브랜치로 미러 → GitHub Pages가 gh-pages를 서빙
name: Publish to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main → gh-pages
        run: git push origin HEAD:gh-pages --force

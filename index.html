<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥚</text></svg>"
    />
    <title>EGGFENSE — 몬스터 배양조</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0e14;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* safe area handled in-game via readSafeInsets() */
      }
      canvas {
        display: block;
      }
      #fsbtn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 8px);
        right: 8px;
        z-index: 50;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 8px;
        background: rgba(10, 13, 19, 0.55);
        color: #e8edf2;
        font-size: 18px;
        line-height: 34px;
        text-align: center;
        opacity: 0.65;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DDR7OJUM.js"></script>
  </head>
  <body>
    <div id="game"></div>
    <button id="fsbtn" title="전체화면">⛶</button>
    <script>
      // 전체화면 토글 (모바일 몰입 모드)
      (function () {
        var btn = document.getElementById('fsbtn');
        if (!document.fullscreenEnabled && !document.webkitFullscreenEnabled) {
          btn.style.display = 'none';
          return;
        }
        btn.addEventListener('click', function () {
          try {
            if (document.fullscreenElement) {
              document.exitFullscreen();
            } else {
              var el = document.documentElement;
              (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
              if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(function () {});
              }
            }
          } catch (e) {
            btn.style.display = 'none';
          }
        });
      })();
    </script>
  </body>
</html>
